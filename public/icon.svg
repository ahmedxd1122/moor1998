<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:rgba(168,85,247,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(168,85,247,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="6" y="6" width="500" height="500" rx="108" ry="108" fill="none" stroke="rgba(168,85,247,0.7)" stroke-width="8"/>
  <!-- Arabic text ساكي -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="180" font-weight="900" text-anchor="middle" fill="white" filter="url(#shadow)" style="text-shadow: 0 0 40px rgba(168,85,247,0.9)">ساكي</text>
  <!-- Decorative dots -->
  <circle cx="120" cy="140" r="8" fill="rgba(168,85,247,0.6)"/>
  <circle cx="392" cy="140" r="8" fill="rgba(236,72,153,0.6)"/>
  <circle cx="80" cy="380" r="5" fill="rgba(168,85,247,0.4)"/>
  <circle cx="432" cy="380" r="5" fill="rgba(236,72,153,0.4)"/>
</svg>
