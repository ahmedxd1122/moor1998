<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:rgba(168,85,247,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(168,85,247,0)"/>
    </radialGradient>
  </defs>
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg2)"/>
  <rect width="512" height="512" fill="url(#glow2)"/>
  <!-- Arabic text ساكي - centered with safe zone padding -->
  <text x="256" y="310" font-family="Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="white">ساكي</text>
</svg>
