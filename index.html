    <style>
      html, body {
        background-color: #0f0f1a;
        margin: 0; padding: 0; height: 100%;
        overscroll-behavior-y: none;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      * { -webkit-overflow-scrolling: touch; }
      body { -webkit-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }

      #native-splash {
        position: fixed; inset: 0; background: #0f0f1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease, transform 0.3s ease;
      }
      #native-splash.hide { opacity: 0; transform: scale(1.03); pointer-events: none; }
      #native-splash img {
        width: 88px; height: 88px; border-radius: 22px;
        border: 2px solid rgba(168,85,247,0.45);
        box-shadow: 0 0 32px rgba(168,85,247,0.3);
        animation: sp 1.6s ease-in-out infinite;
      }
      #native-splash .dots { display: flex; gap: 6px; margin-top: 28px; }
      #native-splash .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: rgba(168,85,247,0.7);
        animation: db 1.2s ease-in-out infinite;
      }
      #native-splash .dot:nth-child(2) { animation-delay: 0.18s; }
      #native-splash .dot:nth-child(3) { animation-delay: 0.36s; }
      @keyframes sp {
        0%,100% { box-shadow: 0 0 24px rgba(168,85,247,0.3); }
        50% { box-shadow: 0 0 48px rgba(168,85,247,0.6); }
      }
      @keyframes db {
        0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
        40% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Native splash: shows instantly, hidden by JS after React mounts -->
    <div id="native-splash">
      <img src="https://j.top4top.io/p_37559m1p51.jpg" alt="ساكي" />
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide native splash once React has rendered something
      window.__hideSplash = function() {
        var el = document.getElementById('native-splash');
        if (el) {
          el.classList.add('hide');
          setTimeout(function() { el.remove(); }, 350);
        }
      };
    </script>
  </body>
